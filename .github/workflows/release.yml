name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        run: |
          ZIP_NAME="vibeCodedTaskManager-${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude ".DS_Store" \
            --exclude "*.local"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "vibeCodedTaskManager ${{ steps.version.outputs.VERSION }}"
          body: |
            ## How to use

            1. Download **vibeCodedTaskManager-${{ steps.version.outputs.VERSION }}.zip** below.
            2. Extract the zip — you will get a `vibeCodedTaskManager` folder.
            3. Open the folder and double-click **start.bat**.
            4. Follow the on-screen instructions (see `Readme.txt` inside the folder).
          files: ${{ env.ZIP_NAME }}
